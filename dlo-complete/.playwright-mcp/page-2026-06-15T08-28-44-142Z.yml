          - generic [ref=e76]: "# Todo Application — Domain Research Document ## Overview A classic single-page Todo application to demonstrate DLO pipeline functionality. ## User Stories 1. As a user, I can add a new todo item by typing in a text input and pressing Enter 2. As a user, I can mark a todo as complete by clicking a checkbox 3. As a user, I can delete a todo by clicking a delete button 4. As a user, I can filter todos by: All, Active, Completed 5. As a user, my todos persist across page refreshes (localStorage) 6. As a user, I can see the count of remaining active todos ## Data Model ```typescript interface Todo { id: string; // UUID text: string; // Todo description completed: boolean; // Completion status createdAt: string; // ISO timestamp } ``` ## Architecture - **Framework**: React + TypeScript - **Styling**: Tailwind CSS - **State**: React useState + useEffect (localStorage persistence) - **Build**: Vite ## API / Data Layer - No backend required - localStorage key: `dlo-todos` - Load on mount, save on every state change ## Exit Clauses - `npm run build` exits 0 - `npm run test` passes (unit tests for add/complete/delete logic) - App renders without console errors - All 3 filter modes return correct subsets ## Constraints - No external API calls - Mobile responsive - Accessible (ARIA labels on interactive elements) - Max 500 lines of code total"

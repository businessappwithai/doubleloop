          - generic [ref=e76]: "# TodoApp Research ## Overview Minimal todo list app with persistent storage. ## Tech Stack - Frontend: TanStack Start (React-based full-stack framework with file-based routing) - Backend: Rust (Axum web framework) - Database: PostgreSQL via sqlx - Styling: Tailwind CSS - State: TanStack Query for server state management ## Features 1. Add new tasks (text input + Add button) 2. Mark tasks complete/incomplete (checkbox toggle) 3. Delete individual tasks (trash button) 4. Filter view: All / Active / Completed tabs 5. Task count display 6. Clear all completed tasks button ## Data Model ```rust struct Task { id: Uuid, text: String, completed: bool, created_at: DateTime<Utc>, } ``` ## PostgreSQL Schema ```sql CREATE TABLE tasks ( id UUID PRIMARY KEY DEFAULT gen_random_uuid(), text TEXT NOT NULL, completed BOOLEAN NOT NULL DEFAULT false, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW() ); ``` ## Rust/Axum API Endpoints - GET /api/tasks → list all tasks (JSON array) - POST /api/tasks → create task { text: string } - PUT /api/tasks/:id → toggle completed - DELETE /api/tasks/:id → delete task - DELETE /api/tasks/completed → clear all completed ## TanStack Start UI Components - routes/index.tsx: root route, owns TanStack Query client - components/TodoInput.tsx: text field + Add button → POST /api/tasks - components/TodoItem.tsx: checkbox + text + delete → PUT/DELETE /api/tasks/:id - components/TodoList.tsx: maps tasks to TodoItems, handles filter - components/TodoFooter.tsx: count + filter tabs + clear button ## Project Structure ``` todo-app/ frontend/ # TanStack Start app src/ routes/ index.tsx components/ TodoInput.tsx TodoItem.tsx TodoList.tsx TodoFooter.tsx package.json vite.config.ts backend/ # Rust/Axum server src/ main.rs routes.rs models.rs db.rs Cargo.toml ``` ## Constraints - Rust backend must compile with zero warnings - PostgreSQL connection via DATABASE_URL env var - CORS enabled for localhost dev - Mobile-responsive UI - No authentication required"

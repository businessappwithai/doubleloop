            - generic [ref=e90]: "# TodoApp — Domain Research Document ## Tech Stack - **Runtime**: Node.js 20, TypeScript - **Framework**: Express.js 4.x - **Database**: PostgreSQL 17 via `pg` npm package (NOT React, NOT localStorage) - **Frontend**: Single `public/index.html` — vanilla HTML + CSS + fetch() - **Testing**: Jest + supertest - **Start**: `ts-node src/index.ts` on PORT=3001 ## Database Schema ```sql CREATE TABLE IF NOT EXISTS todos ( id SERIAL PRIMARY KEY, title VARCHAR(255) NOT NULL, description TEXT DEFAULT '', completed BOOLEAN NOT NULL DEFAULT false, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW() ); ``` ## REST API | Method | Path | Body | Response | |--------|------|------|----------| | GET | /api/todos | — | 200 [{id,title,description,completed,created_at}] | | POST | /api/todos | {title,description?} | 201 {todo} | | PATCH | /api/todos/:id | {title?,description?,completed?} | 200 {todo} | | DELETE | /api/todos/:id | — | 204 | ## Files to Generate ``` package.json ← dependencies: express pg cors dotenv; devDeps: typescript ts-node nodemon jest supertest @types/* tsconfig.json .env.example ← DATABASE_URL=postgresql://dlo:dlopassword@localhost:5433/dlo_app PORT=3001 migrations/ 001_create_todos.sql src/ index.ts ← Express app, serves /api/todos routes + static public/ db.ts ← pg Pool using process.env.DATABASE_URL routes/ todos.ts ← GET/POST/PATCH/DELETE handlers public/ index.html ← Full SPA: fetch /api/todos, add/toggle/delete UI tests/ todos.test.ts ← Jest + supertest: GET, POST, PATCH, DELETE ``` ## Environment Variables ``` DATABASE_URL=postgresql://dlo:dlopassword@localhost:5433/dlo_app PORT=3001 ``` ## Key Constraints - Do NOT generate any React, JSX, or frontend framework code - Do NOT use localStorage — all data lives in PostgreSQL - package.json MUST include ts-node, typescript, nodemon, jest, supertest in devDependencies"

            - text: "# TodoApp — Domain Research Document ## Project Overview A minimal full-stack Todo application demonstrating CRUD operations backed by PostgreSQL. ## Tech Stack - **Runtime**: Node.js 20 with TypeScript - **Framework**: Express.js 4.x (REST API) - **Database**: PostgreSQL 17 via `pg` npm package - **Frontend**: Vanilla HTML/CSS/JS (single `public/index.html`) - **Testing**: Jest with supertest for API integration tests - **Dev server**: `npm run dev` using nodemon ## Database Schema ```sql CREATE TABLE todos ( id SERIAL PRIMARY KEY, title VARCHAR(255) NOT NULL, description TEXT, completed BOOLEAN NOT NULL DEFAULT false, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW() ); ``` ## API Endpoints | Method | Path | Description | |--------|------|-------------| | GET | /api/todos | List all todos | | POST | /api/todos | Create a todo (`{title, description}`) | | PATCH | /api/todos/:id | Update todo (`{title?, description?, completed?}`) | | DELETE | /api/todos/:id | Delete a todo | ## File Structure ``` TodoApp/ ├── package.json ├── tsconfig.json ├── src/ │ ├── index.ts # Express server entry point │ ├── db.ts # pg Pool singleton │ └── routes/todos.ts # CRUD route handlers ├── migrations/ │ └── 001_create_todos.sql ├── public/ │ └── index.html # Single-page UI └── tests/ └── todos.test.ts # Jest + supertest tests ``` ## Environment Variables ``` DATABASE_URL=postgresql://dlo:dlopassword@localhost:5433/dlo_app PORT=3001 ``` ## package.json scripts ```json { \"dev\": \"nodemon --exec ts-node src/index.ts\", \"start\": \"ts-node src/index.ts\", \"build\": \"tsc\", \"test\": \"jest --testEnvironment node\" } ``` ## Dependencies - express, pg, cors, dotenv - devDependencies: typescript, ts-node, nodemon, jest, supertest, @types/*"
